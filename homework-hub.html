<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>SAT Homework</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:          #f1f5f9;
    --surface:     #ffffff;
    --surface2:    #f8fafc;
    --border:      #e2e8f0;
    --text:        #0f172a;
    --text-muted:  #64748b;
    --primary:     #2563eb;
    --primary-light: #60a5fa;
    --shadow:      0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
    --shadow-lg:   0 10px 30px rgba(0,0,0,.08);
    --radius:      0.85rem;
    --radius-sm:   0.5rem;
  }

  body {
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    line-height: 1.55; font-size: 15px;
    min-height: 100vh; min-height: 100dvh;
  }

  /* ── Header ──────────────────────────────────────────────────── */
  .site-header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    box-shadow: var(--shadow);
    position: sticky; top: 0; z-index: 10;
  }
  .header-row {
    max-width: 760px; margin: 0 auto;
    padding: 0.75rem 1.25rem;
    display: flex; align-items: center; gap: 1rem;
  }
  .site-logo {
    font-weight: 800; font-size: 1rem;
    color: var(--primary); white-space: nowrap;
    display: flex; align-items: center; gap: 0.45rem;
  }
  .site-logo-tag {
    flex: 1; font-size: 0.8rem; font-weight: 600;
    color: var(--text-muted); white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
  }
  .back-link {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 0.4rem 0.7rem;
    font-size: 0.82rem; font-weight: 600; color: var(--text);
    text-decoration: none; white-space: nowrap;
    display: inline-flex; align-items: center;
  }
  .back-link:hover { background: var(--bg); }

  /* ── Main ────────────────────────────────────────────────────── */
  main {
    max-width: 760px; margin: 0 auto;
    padding: 1.5rem 1.25rem 4rem;
    display: flex; flex-direction: column; gap: 1.25rem;
  }

  .intro {
    font-size: 0.95rem; color: var(--text-muted); line-height: 1.55;
  }

  /* ── Assignment cards ────────────────────────────────────────── */
  .assignment-grid {
    display: flex; flex-direction: column; gap: 0.85rem;
  }
  .assignment-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1.1rem 1.25rem 1rem;
    box-shadow: var(--shadow);
    display: block;
    text-decoration: none; color: inherit;
    transition: border-color 0.15s, transform 0.12s, box-shadow 0.12s;
    cursor: pointer;
  }
  .assignment-card:hover {
    border-color: var(--primary-light);
    transform: translateY(-2px);
    box-shadow: var(--shadow-lg);
  }
  .assignment-card-top {
    display: flex; align-items: flex-start; gap: 0.85rem;
    margin-bottom: 0.4rem;
  }
  .assignment-card-icon {
    font-size: 1.3rem; line-height: 1;
    flex-shrink: 0; margin-top: 0.1rem;
  }
  .assignment-card-meta { flex: 1; min-width: 0; }
  .assignment-card-title {
    font-size: 1.05rem; font-weight: 700; color: var(--text);
    margin-bottom: 0.2rem;
  }
  .assignment-card-desc {
    font-size: 0.85rem; color: var(--text-muted);
    line-height: 1.45;
  }
  .assignment-card-cta {
    font-size: 0.82rem; font-weight: 700;
    color: var(--primary); align-self: center;
    white-space: nowrap; flex-shrink: 0;
  }

  /* Resume banner on a card */
  .assignment-resume {
    margin-top: 0.7rem;
    background: #eff6ff; border: 1px solid #bfdbfe;
    border-radius: 0.55rem;
    padding: 0.5rem 0.75rem;
    display: flex; align-items: center; justify-content: space-between;
    gap: 0.65rem; font-size: 0.8rem; color: var(--primary);
    font-weight: 600;
  }
  .assignment-resume.hidden { display: none; }
  .resume-discard {
    background: transparent; border: 1px solid #bfdbfe;
    border-radius: 0.35rem; padding: 0.2rem 0.55rem;
    font-size: 0.74rem; font-weight: 700; color: var(--primary);
    cursor: pointer; font-family: inherit;
    white-space: nowrap; flex-shrink: 0;
  }
  .resume-discard:hover { background: #fee2e2; color: #b91c1c; border-color: #fecaca; }

  /* Mastery badge on each card */
  .assignment-mastery {
    margin-top: 0.65rem;
    display: flex; flex-direction: column; gap: 0.3rem;
  }
  .mastery-bar {
    height: 6px; background: var(--border); border-radius: 999px;
    overflow: hidden; display: flex;
  }
  .mastery-bar-mastered   { background: #16a34a; }
  .mastery-bar-struggling { background: #b45309; }
  .mastery-stats {
    font-size: 0.74rem; color: var(--text-muted);
    display: flex; flex-wrap: wrap; gap: 0.6rem;
    font-variant-numeric: tabular-nums;
  }
  .mastery-stats b.mast { color: #16a34a; }
  .mastery-stats b.strg { color: #b45309; }
  .mastery-stats b.uns  { color: var(--text); }

  @media (max-width: 600px) {
    .header-row { padding: 0.6rem 0.85rem; gap: 0.55rem; }
    main { padding: 1rem 0.85rem 3rem; gap: 1rem; }
    .assignment-card { padding: 0.95rem 1rem; }
    .assignment-card-icon { font-size: 1.15rem; }
    .assignment-card-title { font-size: 0.98rem; }
  }
  </style>
  <script src="gate.js?v=20260609"></script>
  <script src="anti-cheat.js?v=20260609"></script>
</head>
<body>

<header class="site-header">
  <div class="header-row">
    <span class="site-logo">&#128221; SAT Homework</span>
    <span class="site-logo-tag" id="hwTag">— assignments</span>
    <a href="index.html" class="back-link">&larr; Hub</a>
  </div>
</header>

<main>

  <p class="intro">Pick an assignment to start.</p>

  <div class="assignment-grid" id="assignmentGrid"></div>

</main>

<!-- Need question banks + progress ledger to compute per-assignment mastery -->
<script src="data-conventions.js?v=20260609"></script>
<script src="data-craft-structure.js?v=20260615b"></script>
<script src="data-expression-of-ideas.js?v=20260615"></script>
<script src="data-info-ideas.js?v=20260615b"></script>
<script src="progress.js?v=20260609"></script>
<script src="homework/assignments.js?v=20260611"></script>
<script>
(function () {
  // ── Build the pool an assignment draws from (for mastery counts) ─
  function buildAssignmentPool(a) {
    const bank = HW_BANK_LOOKUP[a.bank] ? HW_BANK_LOOKUP[a.bank]() : [];
    const seen = new Set();
    const pool = [];
    a.sections.forEach(sec => {
      if (sec.ids && sec.ids.length) {
        const idMap = Object.fromEntries(bank.map(q => [q.id, q]));
        sec.ids.forEach(id => {
          if (!seen.has(id) && idMap[id]) { seen.add(id); pool.push(idMap[id]); }
        });
        return;
      }
      let candidates = bank.filter(q =>
        q.skill === sec.skill && q.difficulty === sec.difficulty
      );
      if (sec.ruleWeights) {
        const allowed = new Set(Object.keys(sec.ruleWeights));
        candidates = candidates.filter(q => allowed.has(q.ruleType));
      }
      candidates.forEach(q => {
        if (!seen.has(q.id)) { seen.add(q.id); pool.push(q); }
      });
    });
    return pool;
  }

  function renderMastery(a) {
    const pool = buildAssignmentPool(a);
    if (pool.length === 0) return '';
    const s = getPoolSummary(pool);
    const total = s.total || 1;
    const masteredPct   = (s.mastered   / total) * 100;
    const strugglingPct = (s.struggling / total) * 100;
    return `
      <div class="assignment-mastery">
        <div class="mastery-bar">
          <div class="mastery-bar-mastered"   style="width:${masteredPct}%"></div>
          <div class="mastery-bar-struggling" style="width:${strugglingPct}%"></div>
        </div>
        <div class="mastery-stats">
          <span><b class="mast">${s.mastered}</b> mastered</span>
          <span><b class="strg">${s.struggling}</b> needs review</span>
          <span><b class="uns">${s.unseen}</b> unseen</span>
          <span>of ${s.total}</span>
        </div>
      </div>
    `;
  }

  // ── In-progress state per assignment ───────────────────────────
  const RESUME_TTL = 7 * 86_400_000;
  function readResumeState(a) {
    try {
      const raw = localStorage.getItem(a.storageKey);
      if (!raw) return null;
      const s = JSON.parse(raw);
      if (!s || !Array.isArray(s.ids) || s.ids.length === 0) return null;
      if (!s.savedAt || Date.now() - s.savedAt > RESUME_TTL) {
        // Stale — clean up on the way past so the hub stays accurate
        try { localStorage.removeItem(a.storageKey); } catch (e) {}
        return null;
      }
      const answered = Object.keys(s.answers || {}).length;
      if (answered >= s.ids.length) return null;
      return { total: s.ids.length, answered, index: s.index || 0 };
    } catch (e) { return null; }
  }

  function renderResume(a) {
    const state = readResumeState(a);
    if (!state) return '';
    const ctaLabel = `Q${state.index + 1} of ${state.total}`;
    return `
      <div class="assignment-resume">
        <span>&#128205; In progress &mdash; ${ctaLabel} &middot; ${state.answered} answered</span>
        <button class="resume-discard" type="button" data-discard="${escapeHtml(a.storageKey)}">Discard</button>
      </div>
    `;
  }

  // ── Render assignment cards ─────────────────────────────────────
  const grid = document.getElementById('assignmentGrid');

  function renderAllCards() {
    grid.innerHTML = '';
    HW_ASSIGNMENTS.forEach(a => {
      const card = document.createElement('a');
      card.className = 'assignment-card';
      card.href = `homework-run.html?assignment=${encodeURIComponent(a.id)}`;
      const resumeState = readResumeState(a);
      const cta = resumeState ? 'Resume &rarr;' : 'Start &rarr;';
      card.innerHTML = `
        <div class="assignment-card-top">
          <div class="assignment-card-icon">&#128221;</div>
          <div class="assignment-card-meta">
            <div class="assignment-card-title">${escapeHtml(a.title)}</div>
            <div class="assignment-card-desc">${escapeHtml(a.description || '')}</div>
          </div>
          <span class="assignment-card-cta">${cta}</span>
        </div>
        ${renderResume(a)}
        ${renderMastery(a)}
      `;
      grid.appendChild(card);
    });
  }

  renderAllCards();

  // Discard button — clears one in-progress homework without entering the runner.
  // Event delegation so we don't re-bind after every render.
  grid.addEventListener('click', e => {
    const btn = e.target.closest('.resume-discard');
    if (!btn) return;
    e.preventDefault();
    e.stopPropagation();
    const key = btn.getAttribute('data-discard');
    if (!key) return;
    if (!confirm('Discard this in-progress homework? You\'ll start over next time.')) return;
    try { localStorage.removeItem(key); } catch (err) {}
    renderAllCards();
  });

  // Header tag shows the count
  document.getElementById('hwTag').textContent =
    `${HW_ASSIGNMENTS.length} assignment${HW_ASSIGNMENTS.length === 1 ? '' : 's'} available`;

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
})();
</script>
<script src="nav.js?v=20260609" defer></script>
</body>
</html>
